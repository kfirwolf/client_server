<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" style="background:#ffffff; color-scheme: light dark; background-color: light-dark(#ffffff, #121212);">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title / formula -->
  <text x="40" y="30" font-family="sans-serif" font-size="12" fill="#5F5E5A">pool: 2048 bytes  ·  min block: 256 bytes  ·  4 levels (0–3)  ·  max_nodes = 15</text>
  <text x="40" y="52" font-family="sans-serif" font-size="12" fill="#5F5E5A">slot = (2^level − 1) + (offset / block_size_at_level)</text>

  <!-- Level labels -->
  <text x="40" y="100" font-family="sans-serif" font-size="12" fill="#888780">level 0</text>
  <text x="40" y="190" font-family="sans-serif" font-size="12" fill="#888780">level 1</text>
  <text x="40" y="290" font-family="sans-serif" font-size="12" fill="#888780">level 2</text>
  <text x="40" y="390" font-family="sans-serif" font-size="12" fill="#888780">level 3</text>

  <!-- Level 0: slot 0 -->
  <rect x="320" y="72" width="260" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="450" y="91" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">slot 0</text>
  <text x="450" y="108" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">offset 0  ·  size 2048</text>

  <!-- Arrows level 0 → level 1 -->
  <line x1="380" y1="116" x2="255" y2="158" stroke="#888780" stroke-width="0.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="520" y1="116" x2="645" y2="158" stroke="#888780" stroke-width="0.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Level 1: slots 1, 2 -->
  <rect x="120" y="158" width="250" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="245" y="177" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">slot 1</text>
  <text x="245" y="194" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3C3489">offset 0  ·  size 1024</text>

  <rect x="530" y="158" width="250" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="655" y="177" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">slot 2</text>
  <text x="655" y="194" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3C3489">offset 1024  ·  size 1024</text>

  <!-- Arrows level 1 → level 2 -->
  <line x1="175" y1="202" x2="115" y2="258" stroke="#888780" stroke-width="0.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="310" y1="202" x2="370" y2="258" stroke="#888780" stroke-width="0.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="585" y1="202" x2="525" y2="258" stroke="#888780" stroke-width="0.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="720" y1="202" x2="780" y2="258" stroke="#888780" stroke-width="0.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Level 2: slots 3, 4, 5, 6 -->
  <rect x="50" y="258" width="150" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="125" y="277" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">slot 3</text>
  <text x="125" y="294" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">off 0 · 512</text>

  <rect x="305" y="258" width="150" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="380" y="277" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">slot 4</text>
  <text x="380" y="294" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">off 512 · 512</text>

  <rect x="460" y="258" width="150" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="535" y="277" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">slot 5</text>
  <text x="535" y="294" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">off 1024 · 512</text>

  <rect x="715" y="258" width="150" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="790" y="277" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">slot 6</text>
  <text x="790" y="294" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">off 1536 · 512</text>

  <!-- Arrows level 2 → level 3 -->
  <line x1="85" y1="302" x2="65" y2="358" stroke="#888780" stroke-width="0.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="165" y1="302" x2="190" y2="358" stroke="#888780" stroke-width="0.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="340" y1="302" x2="315" y2="358" stroke="#888780" stroke-width="0.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="415" y1="302" x2="440" y2="358" stroke="#888780" stroke-width="0.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Level 3: slots 7–10 (showing first 4, rest implied) -->
  <rect x="40" y="358" width="120" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="100" y="377" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">slot 7</text>
  <text x="100" y="394" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993C1D">off 0 · 256</text>

  <rect x="170" y="358" width="120" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="230" y="377" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">slot 8</text>
  <text x="230" y="394" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993C1D">off 256 · 256</text>

  <rect x="300" y="358" width="120" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="360" y="377" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">slot 9</text>
  <text x="360" y="394" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993C1D">off 512 · 256</text>

  <rect x="430" y="358" width="120" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="490" y="377" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">slot 10</text>
  <text x="490" y="394" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993C1D">off 768 · 256</text>

  <text x="580" y="377" font-family="sans-serif" font-size="12" fill="#888780">... slots 11–14</text>
  <text x="580" y="394" font-family="sans-serif" font-size="12" fill="#888780">(offsets 1024–1792)</text>

  <!-- Legend -->
  <rect x="40" y="452" width="12" height="12" rx="2" fill="#1D9E75"/>
  <text x="58" y="463" font-family="sans-serif" font-size="12" fill="#5F5E5A">root (level 0)</text>
  <rect x="165" y="452" width="12" height="12" rx="2" fill="#7F77DD"/>
  <text x="183" y="463" font-family="sans-serif" font-size="12" fill="#5F5E5A">level 1</text>
  <rect x="250" y="452" width="12" height="12" rx="2" fill="#888780"/>
  <text x="268" y="463" font-family="sans-serif" font-size="12" fill="#5F5E5A">level 2</text>
  <rect x="340" y="452" width="12" height="12" rx="2" fill="#D85A30"/>
  <text x="358" y="463" font-family="sans-serif" font-size="12" fill="#5F5E5A">leaf level (min block size)</text>
  <text x="570" y="463" font-family="sans-serif" font-size="12" fill="#888780">buddy(offset, size) = offset XOR size</text>
</svg>
