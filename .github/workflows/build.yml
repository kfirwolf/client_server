name: Build and Test Project

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Install dependencies and build GTest
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libgtest-dev
          cd /usr/src/gtest
          sudo cmake .
          sudo make
          sudo cp lib/*.a /usr/lib

      - name: Build the core library with Makefile
        run: |
          make

      - name: Build and run CLIENT_SERVER tests
        run: |
          mkdir -p CLIENT_SERVER/build && cd CLIENT_SERVER/build
          cmake ..
          make
          ctest --output-on-failure

      - name: Build and run INFRA tests
        run: |
          mkdir -p INFRA/build && cd INFRA/build
          cmake ..
          make
          ctest --output-on-failure
